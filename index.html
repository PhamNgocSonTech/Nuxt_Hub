<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học viện Vue, Pinia & Nuxt 4 Pro (AI Powered)</title>

    <!-- Tải Tailwind CSS cho UI/UX (Bản mô phỏng trên Browser) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        vue: '#42b883',
                        vuetxt: '#35495e',
                        nuxt: '#00DC82',
                        pinia: '#FFE56E',
                        gemini: '#8b5cf6',
                        ts: '#3178c6'
                    }
                }
            }
        }
    </script>

    <!-- Tải Vue 3, Vue Demi (yêu cầu của Pinia), và Pinia -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-demi@0.14.6/lib/index.iife.js"></script>
    <script src="https://unpkg.com/pinia@2.1.7/dist/pinia.iife.js"></script>

    <!-- Tải FontAwesome cho Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .code-block {
            font-family: 'Fira Code', monospace;
            background: #1e293b;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            color: #e2e8f0;
            border: 1px solid #334155;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .fade-enter-active,
        .fade-leave-active {
            transition: opacity 0.3s ease;
        }

        .fade-enter-from,
        .fade-leave-to {
            opacity: 0;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        .ai-content code {
            background: #0f172a;
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            color: #00DC82;
            font-family: monospace;
            border: 1px solid #334155;
        }

        .ai-content b,
        .ai-content strong {
            color: #fff;
        }

        .ai-content ul {
            list-style-type: disc;
            margin-left: 1.5rem;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .ai-content p {
            margin-bottom: 0.75rem;
        }
    </style>
</head>

<body class="h-screen flex flex-col overflow-hidden">

    <div id="app" class="h-full flex flex-col"></div>

    <!-- ========================================== -->
    <!-- TEMPLATE: LAYOUT CHÍNH                     -->
    <!-- ========================================== -->
    <script type="text/x-template" id="app-template">
        <header class="glass-panel border-b border-slate-700 flex justify-between items-center p-4 shadow-lg shrink-0 z-10">
            <div class="flex items-center gap-3">
                <i class="fa-brands fa-vuejs text-3xl text-vue"></i>
                <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-vue via-nuxt to-pinia hidden sm:block">
                    Vue & Nuxt Pro Hub
                </h1>
                <span class="bg-gemini text-white text-xs px-2 py-0.5 rounded-full shadow-[0_0_10px_rgba(139,92,246,0.5)] border border-purple-400">✨ AI Powered</span>
            </div>
            
            <div class="flex items-center gap-4 bg-slate-800 px-4 py-2 rounded-full border border-slate-700">
                <div class="flex gap-3 text-sm items-center">
                    <span class="text-nuxt font-bold">{{ store.completedTasks }}/11</span>
                    <div class="h-4 w-px bg-slate-600 mx-0.5"></div>
                    <span class="text-vue font-bold" title="Kinh nghiệm">{{ store.exp }} XP</span>
                    <div class="h-4 w-px bg-slate-600 mx-0.5"></div>
                    <span class="text-yellow-400 font-bold" title="Tài sản"><i class="fa-solid fa-coins"></i> {{ store.coins }}</span>
                    <div class="h-4 w-px bg-slate-600 mx-0.5"></div>
                    <!-- Streak Indicator -->
                    <div class="flex items-center gap-1.5 px-2 py-0.5 rounded bg-slate-900 border border-slate-700 cursor-help" :title="store.streakIcon.name">
                        <i :class="[store.streakIcon.icon, store.streakIcon.color]"></i>
                        <span class="font-bold text-white">{{ store.streak }}</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden relative">
            <!-- Sidebar -->
            <aside class="w-72 glass-panel border-r border-slate-700 flex flex-col overflow-y-auto shrink-0 z-20">
                <!-- KHU VỰC ĐIỂM DANH & PHẦN THƯỞNG -->
                <div class="p-4 border-b border-slate-700 bg-slate-800/30">
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Điểm danh hằng ngày</span>
                        <span :class="store.streakIcon.color" class="text-[10px] font-bold bg-slate-900 px-2 py-1 rounded border border-slate-700">
                            {{ store.streakIcon.name }}
                        </span>
                    </div>

                    <!-- Giao diện Khôi phục Chuỗi khi quên điểm danh -->
                    <div v-if="store.needsRestore" class="mb-3 p-3 bg-red-900/30 border border-red-700/50 rounded-lg shadow-inner">
                        <p class="text-[11px] text-red-300 mb-2 leading-relaxed"><i class="fa-solid fa-fire-extinguisher"></i> Cảnh báo! Chuỗi bị đóng băng do quên điểm danh <b>{{ store.missedDays }} ngày</b>.</p>
                        <button @click="store.restoreStreak" :disabled="store.coins < store.restoreCost" class="w-full bg-orange-600 hover:bg-orange-500 text-white text-xs font-bold py-2 rounded mb-1 transition disabled:opacity-50 flex justify-between px-3 items-center">
                            <span>Mở khóa chuỗi</span>
                            <span>{{ store.restoreCost }} Xu</span>
                        </button>
                        <button @click="store.checkInAfterBreak" class="w-full text-xs text-slate-400 hover:text-white py-1">
                            Bỏ qua, Làm lại từ đầu
                        </button>
                    </div>

                    <!-- Nút điểm danh bình thường -->
                    <button v-else
                        @click="store.checkIn" 
                        :disabled="!store.canCheckIn"
                        :class="store.canCheckIn ? 'bg-gradient-to-r from-vue to-nuxt hover:from-green-400 hover:to-green-500 text-slate-900 shadow-[0_0_10px_rgba(0,220,130,0.3)]' : 'bg-slate-700 text-slate-500 cursor-not-allowed'"
                        class="w-full py-2.5 rounded-lg text-sm font-bold transition-all flex flex-col items-center justify-center gap-1 mb-2"
                    >
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-calendar-check text-lg"></i>
                            {{ store.canCheckIn ? 'Điểm danh ngay' : 'Đã điểm danh hôm nay' }}
                        </div>
                        <span v-if="store.canCheckIn" class="text-[10px] opacity-80">+50 XP & +{{ store.nextCoinReward }} Xu thưởng</span>
                    </button>
                    <p class="text-[10px] text-slate-500 text-center mt-2" v-if="!store.needsRestore">Giữ chuỗi liên tiếp để nhận thưởng XU cao hơn (1->6)! Dùng XU để cứu chuỗi nếu lỡ quên.</p>
                </div>

                <div class="p-4 text-xs font-semibold text-slate-400 uppercase tracking-wider">Lộ trình học tập</div>
                <nav class="flex-1 flex flex-col gap-1 px-2 pb-4">
                    <button v-for="tab in tabs" :key="tab.id"
                        @click="activeTab = tab.id"
                        :class="['flex items-center justify-between px-4 py-3 rounded-lg text-left transition-all', 
                                 activeTab === tab.id ? tab.color + ' bg-slate-800 shadow-md border border-slate-700' : 'text-slate-400 hover:bg-slate-800/50 hover:text-white']">
                        <div class="flex items-center gap-3">
                            <i :class="tab.icon + ' w-5 text-center'"></i>
                            <span class="font-medium text-sm">{{ tab.name }}</span>
                        </div>
                        <i v-if="store.completed.includes(tab.id)" class="fa-solid fa-circle-check text-green-500 text-xs"></i>
                    </button>
                </nav>
            </aside>

            <!-- Main Content -->
            <main class="flex-1 overflow-y-auto p-6 lg:p-10 relative bg-[#0B1121]">
                <Transition name="fade" mode="out-in">
                    <component :is="activeComponent"></component>
                </Transition>
            </main>

            <!-- ✨ AI Modal (Global) -->
            <Transition name="fade">
                <div v-if="store.aiModalOpen" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                    <div class="bg-slate-800 border border-slate-600 rounded-xl shadow-[0_0_30px_rgba(139,92,246,0.2)] w-full max-w-2xl flex flex-col max-h-[80vh]">
                        <div class="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-900/80 rounded-t-xl">
                            <h3 class="font-bold text-lg text-purple-400 flex items-center gap-2">
                                <i v-if="store.aiLoading" class="fa-solid fa-circle-notch fa-spin"></i>
                                <i v-else class="fa-solid fa-wand-magic-sparkles"></i>
                                {{ store.aiTitle }}
                            </h3>
                            <button @click="store.aiModalOpen = false" class="text-slate-400 hover:text-white transition"><i class="fa-solid fa-xmark text-xl"></i></button>
                        </div>
                        <div class="p-6 overflow-y-auto text-slate-200 leading-relaxed text-sm ai-content">
                            <div v-if="store.aiLoading" class="flex flex-col items-center justify-center py-10 text-slate-400 gap-4">
                                <i class="fa-solid fa-microchip text-4xl text-gemini animate-pulse"></i>
                                <p>Gemini đang phân tích code của bạn...</p>
                            </div>
                            <div v-else v-html="store.aiResponse"></div>
                        </div>
                    </div>
                </div>
            </Transition>
        </div>
    </script>

    <!-- ========================================== -->
    <!-- 1. VUE BASIC: COMPOSITION VS OPTIONS       -->
    <!-- ========================================== -->
    <script type="text/x-template" id="vue-basic-template">
        <div class="max-w-6xl mx-auto space-y-8">
            <h2 class="text-3xl font-bold text-vue"><i class="fa-brands fa-vuejs"></i> 1. Vue API Styles & Directives</h2>
            <p class="text-slate-400">Khởi đầu của Vue. Hiện nay <code class="text-vue">Composition API (&lt;script setup&gt;)</code> là tiêu chuẩn bắt buộc trong các dự án mới và Nuxt.</p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="glass-panel p-6 rounded-xl border border-red-900/30">
                    <h3 class="font-bold text-lg text-red-400 border-b border-red-900/50 pb-2 mb-4">Cách cũ: Options API</h3>
                    <ul class="text-sm space-y-2 text-slate-300 list-disc ml-4 mb-4">
                        <li>Logic bị phân mảnh vào các block <code>data()</code>, <code>methods</code>, <code>computed</code>.</li>
                        <li>Dễ học ban đầu, nhưng cực kỳ khó bảo trì khi file lớn. Khó tái sử dụng.</li>
                    </ul>
                    <pre class="code-block text-xs border-red-900/50" v-pre>export default {
  data() { return { count: 0 } },
  methods: { add() { this.count++ } }
}</pre>
                </div>
                <div class="glass-panel p-6 rounded-xl border border-vue/30 shadow-[0_0_15px_rgba(66,184,131,0.1)]">
                    <h3 class="font-bold text-lg text-vue border-b border-vue/30 pb-2 mb-4">Tiêu chuẩn mới: Composition API</h3>
                    <ul class="text-sm space-y-2 text-slate-300 list-disc ml-4 mb-4">
                        <li>Sử dụng cú pháp <code>&lt;script setup&gt;</code> vô cùng ngắn gọn.</li>
                        <li>Gom nhóm logic theo <b>Tính năng</b>, tái sử dụng dễ dàng qua <i>Composables</i>.</li>
                    </ul>
                    <pre class="code-block text-xs border-vue/50" v-pre>&lt;script setup&gt;
import { ref } from 'vue'
const count = ref(0)
const add = () => count.value++
&lt;/script&gt;</pre>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass-panel p-6 rounded-xl space-y-6">
                    <div>
                        <h3 class="font-bold text-lg border-b border-slate-700 pb-2 mb-4">Thực hành Directives (<code>v-model</code>, <code>v-for</code>)</h3>
                        <input v-model="newItem" @keyup.enter="addItem" placeholder="Nhập tên món đồ..." class="w-full bg-slate-900 border border-slate-600 rounded px-4 py-2 text-white outline-none focus:border-vue">
                        <button @click="addItem" class="w-full bg-slate-700 hover:bg-slate-600 mt-2 py-2 rounded text-sm transition">Thêm vào giỏ</button>
                    </div>
                    <div>
                        <ul class="space-y-2 mb-4">
                            <li v-for="(item, index) in items" :key="index" class="flex justify-between items-center bg-slate-800 p-2 rounded border border-slate-700">
                                <span>{{ item }}</span>
                                <button @click="removeItem(index)" class="text-red-400 hover:text-red-300"><i class="fa-solid fa-trash"></i></button>
                            </li>
                        </ul>
                        <div v-if="items.length === 0" class="text-yellow-500 text-sm p-3 bg-yellow-900/20 border border-yellow-700/50 rounded">
                            <i class="fa-solid fa-triangle-exclamation"></i> Giỏ hàng trống!
                        </div>
                    </div>
                </div>

                <div class="relative group h-full">
                    <button @click="store.explainCode($refs.codeBlock.innerText)" class="absolute top-3 right-3 bg-purple-600/80 hover:bg-purple-500 border border-purple-400 text-xs px-3 py-1.5 rounded text-white transition shadow-lg flex items-center gap-2 z-10 opacity-0 group-hover:opacity-100 backdrop-blur-sm">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> ✨ Giải thích Code
                    </button>
                    <pre ref="codeBlock" class="code-block h-full pt-12" v-pre>
<span class="text-slate-500">&lt;script setup&gt;</span>
import { ref, computed } from 'vue'

<span class="text-slate-500">// Khai báo biến phản ứng bằng ref()</span>
const newItem = <span class="text-vue">ref</span>('')
const items = <span class="text-vue">ref</span>(['Bàn phím', 'Chuột'])

function addItem() {
  if(newItem.value) {
    items.value.push(newItem.value)
    newItem.value = '' <span class="text-slate-500">// Tự động reset input</span>
  }
}
<span class="text-slate-500">&lt;/script&gt;</span>

<span class="text-slate-500">&lt;template&gt;</span>
  <span class="text-slate-500">&lt;!-- Two-way binding với v-model --&gt;</span>
  &lt;input <span class="text-vue">v-model</span>="newItem" /&gt;
  
  &lt;ul&gt;
    &lt;li <span class="text-vue">v-for</span>="(item, i) in items" :key="i"&gt;{{ item }}&lt;/li&gt;
  &lt;/ul&gt;
<span class="text-slate-500">&lt;/template&gt;</span></pre>
                </div>
            </div>
            
            <button @click="store.markCompleted('vue-basic', 100)" class="bg-vue text-slate-900 font-bold px-6 py-2 rounded-lg hover:bg-green-400 mt-6">Hoàn thành Bài 1 (+100 XP)</button>
        </div>
    </script>

    <!-- ========================================== -->
    <!-- 2. VUE COMPONENTS: PROPS, EMITS, SLOTS     -->
    <!-- ========================================== -->
    <script type="text/x-template" id="vue-components-template">
        <div class="max-w-6xl mx-auto space-y-8">
            <h2 class="text-3xl font-bold text-vue"><i class="fa-solid fa-cubes"></i> 2. Vue Components: Props, Emits & Slots</h2>
            <p class="text-slate-400">Cách tách nhỏ giao diện để <b>tái sử dụng</b>. Component Cha và Con giao tiếp với nhau bằng Props/Emits, và chia sẻ HTML bằng Slots.</p>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Vùng mô phỏng thực tế -->
                <div class="glass-panel p-6 rounded-xl space-y-6 bg-slate-800/50">
                    <h3 class="font-bold text-vue mb-2 border-b border-slate-700 pb-2">Parent Component (Giao diện gốc)</h3>
                    <div class="text-sm bg-slate-900 p-3 rounded">Số lượt Like nhận từ con: <strong class="text-vue text-lg">{{ likesCount }}</strong></div>
                    
                    <div class="mt-4 p-5 border-2 border-dashed border-blue-500/50 bg-slate-800 rounded-lg relative">
                        <span class="absolute -top-3 left-4 bg-blue-600 text-xs px-2 py-1 rounded">CardComponent.vue (Con)</span>
                        <h4 class="font-bold text-lg mb-2">{{ parentCardTitle }}</h4> <span class="text-xs text-slate-400">(Truyền bằng Props)</span>
                        
                        <div class="bg-slate-700 p-3 mt-2 rounded border-l-4 border-vue text-sm">
                            <em>Đây là nội dung được truyền vào thông qua <b>&lt;slot&gt;</b> từ Component Cha!</em>
                        </div>

                        <button @click="emitLike" class="mt-4 bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded text-sm transition">
                            <i class="fa-solid fa-thumbs-up"></i> Gửi Like lên Cha (Emit)
                        </button>
                    </div>
                </div>

                <div class="relative group h-full">
                    <button @click="store.explainCode($refs.codeBlock.innerText)" class="absolute top-3 right-3 bg-purple-600/80 hover:bg-purple-500 border border-purple-400 text-xs px-3 py-1.5 rounded text-white transition shadow-lg flex items-center gap-2 z-10 opacity-0 group-hover:opacity-100 backdrop-blur-sm">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> ✨ Giải thích Code
                    </button>
                    <pre ref="codeBlock" class="code-block h-full pt-12" v-pre>
<span class="text-slate-500">&lt;!-- 📦 ChildCard.vue (Component Con) --&gt;</span>
<span class="text-slate-500">&lt;script setup&gt;</span>
<span class="text-slate-500">// 1. Nhận dữ liệu text từ Cha (Props)</span>
const props = <span class="text-vue">defineProps</span>(['title'])

<span class="text-slate-500">// 2. Định nghĩa sự kiện gửi lên Cha (Emits)</span>
const emit = <span class="text-vue">defineEmits</span>(['likeAction'])
<span class="text-slate-500">&lt;/script&gt;</span>

<span class="text-slate-500">&lt;template&gt;</span>
  &lt;div class="card"&gt;
    &lt;h3&gt;{{ title }}&lt;/h3&gt;
    <span class="text-slate-500">&lt;!-- 3. SLOT: Lỗ hổng để nhét HTML từ Cha vào --&gt;</span>
    <span class="text-vue">&lt;slot&gt;</span>Nội dung mặc định nếu Cha ko truyền<span class="text-vue">&lt;/slot&gt;</span>
    
    &lt;button @click="emit('likeAction')"&gt;Like&lt;/button&gt;
  &lt;/div&gt;
<span class="text-slate-500">&lt;/template&gt;</span>

<span class="text-slate-500">------------------------------------</span>
<span class="text-slate-500">&lt;!-- 🏠 Parent.vue (Sử dụng tái sử dụng) --&gt;</span>
<span class="text-slate-500">&lt;template&gt;</span>
  &lt;<span class="text-blue-400">ChildCard</span> <span class="text-vue">title</span>="Thẻ số 1" <span class="text-vue">@likeAction</span>="handleLike"&gt;
    &lt;p&gt;HTML được nhét vào Slot nè!&lt;/p&gt;
  &lt;/<span class="text-blue-400">ChildCard</span>&gt;
<span class="text-slate-500">&lt;/template&gt;</span></pre>
                </div>
            </div>
            
            <button @click="store.markCompleted('vue-components', 150)" class="bg-vue text-slate-900 font-bold px-6 py-2 rounded-lg hover:bg-green-400">Hoàn thành Bài 2 (+150 XP)</button>
        </div>
    </script>

    <!-- ========================================== -->
    <!-- 3. VUE ADVANCED: WATCHERS & LIFECYCLE      -->
    <!-- ========================================== -->
    <script type="text/x-template" id="vue-adv-template">
        <div class="max-w-6xl mx-auto space-y-8">
            <h2 class="text-3xl font-bold text-vue"><i class="fa-solid fa-arrows-spin"></i> 3. Vue: Lifecycle & Watchers</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <!-- Giải thích Lifecycle -->
                <div class="col-span-1 md:col-span-3 glass-panel p-6 rounded-xl border border-slate-700">
                    <h3 class="font-bold text-lg mb-4 text-white">Vòng đời của Component (Lifecycle Hooks)</h3>
                    <div class="flex flex-col md:flex-row gap-4 justify-between text-sm">
                        <div class="flex-1 bg-slate-800 p-4 rounded border-l-4 border-slate-500">
                            <code class="text-vue font-bold">onBeforeMount</code><br>
                            <span class="text-slate-400">Đã setup xong Logic, nhưng chưa vẽ UI lên màn hình.</span>
                        </div>
                        <div class="flex-1 bg-slate-800 p-4 rounded border-l-4 border-green-500">
                            <code class="text-vue font-bold">onMounted</code><br>
                            <span class="text-slate-400">UI đã vẽ xong. Thường dùng để <b>Fetch API</b> hoặc khởi tạo thư viện ngoài.</span>
                        </div>
                        <div class="flex-1 bg-slate-800 p-4 rounded border-l-4 border-red-500">
                            <code class="text-vue font-bold">onUnmounted</code><br>
                            <span class="text-slate-400">Khi Component bị xóa khỏi DOM. Bắt buộc dùng để dọn dẹp biến tránh Memory Leak.</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass-panel p-6 rounded-xl space-y-6">
                    <div>

import { createRouter, createWebHistory } from 'vue-router'

const routes = [
  <span class="text-slate-500">// 1. LAYOUT VÀ NESTED ROUTES</span>
  <span class="text-slate-500">// File Layout chứa Header & Footer. Trẻ con (children) sẽ render vào &lt;router-view&gt;</span>
  {
    path: '/', component: MainLayout,
    children: [
      { path: '', component: Home },
      
      <span class="text-slate-500">// 2. DYNAMIC ROUTING (ID và Slug)</span>
      <span class="text-slate-500">// Khai báo biến động bằng dấu hai chấm ":"</span>
      { path: 'users/:id', component: UserProfile }, 
      { path: 'post/:slug', component: PostDetail },

      <span class="text-slate-500">// 3. AUTH & ROLES (Phân quyền)</span>
      <span class="text-slate-500">// Gắn thẻ meta để Middleware nhận biết quyền cần thiết</span>
      { path: 'admin', component: AdminPanel, meta: { requireAuth: true, role: 'admin' } }
    ]
  },
  <span class="text-slate-500">// 4. CATCH-ALL (Trang 404)</span>
  <span class="text-slate-500">// Bắt tất cả các path không khớp với bất kỳ khai báo nào ở trên</span>
  { path: '/:pathMatch(.*)*', component: NotFound }
]

const router = createRouter({ history: createWebHistory(), routes })

<span class="text-slate-500">// --- MIDDLEWARE (GLOBAL GUARDS) ---</span>
router.beforeEach((to, from, next) => {
  <span class="text-slate-500">// Nếu trang yêu cầu Đăng nhập mà chưa có Token -> Về Home/Login</span>
  if (to.meta.requireAuth && !isLoggedIn) {
    return next('/login')
  }
  <span class="text-slate-500">// Nếu trang yêu cầu quyền Admin mà tài khoản chỉ là User -> Về 403 Forbidden</span>
  if (to.meta.role === 'admin' && user.role !== 'admin') {
    return next('/403')
  }
  next() <span class="text-slate-500">// Hợp lệ, cho phép đi tiếp</span>
})</pre>

    <!-- LOGIC ỨNG DỤNG VÀ GEMINI API               -->

    <script>
        const { createApp, ref, computed, watch, onMounted, onUnmounted } = Vue;
        const { createPinia, defineStore, storeToRefs } = Pinia;

        const apiKey = "";

        async function fetchGeminiText(prompt, systemInstruction) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = { contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: systemInstruction }] } };
            let retries = 5, delay = 1000;
            for (let i = 0; i < retries; i++) {
                try {
                    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "Lỗi phản hồi.";
                } catch (e) { if (i === retries - 1) throw e; await new Promise(r => setTimeout(r, delay)); delay *= 2; }
            }
        }

        async function fetchGeminiJson(prompt, systemInstruction) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: systemInstruction }] },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            question: { type: "STRING" }, options: { type: "ARRAY", items: { type: "STRING" } },
                            correctIndex: { type: "INTEGER" }, explanation: { type: "STRING" }
                        }, required: ["question", "options", "correctIndex", "explanation"]
                    }
                }
            };
            let retries = 5, delay = 1000;
            for (let i = 0; i < retries; i++) {
                try {
                    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json(); return JSON.parse(data.candidates[0].content.parts[0].text);
                } catch (e) { if (i === retries - 1) throw e; await new Promise(r => setTimeout(r, delay)); delay *= 2; }
            }
        }

        const useAppStore = defineStore('appStore', () => {
            // LOAD TỪ LOCALSTORAGE
            const lsStr = localStorage.getItem('vueNuxtHubState');
            const savedState = lsStr ? JSON.parse(lsStr) : {};

            const exp = ref(savedState.exp || 0);
            const completed = ref(savedState.completed || []);
            const coins = ref(savedState.coins || 0);

            // --- TÍNH NĂNG ĐIỂM DANH & KHÔI PHỤC (STREAK) ---
            const streak = ref(savedState.streak || 0);
            const lastCheckIn = ref(savedState.lastCheckIn || null);
            const missedDays = ref(0);
            const currentDate = ref(new Date());

            const getStrDate = (dateObj) => {
                const d = new Date(dateObj);
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            };

            const todayStr = computed(() => getStrDate(currentDate.value));

            watch(todayStr, (todayValue) => {
                if (lastCheckIn.value) {
                    const lastDate = new Date(lastCheckIn.value);
                    const todayDate = new Date(todayValue);
                    const diffTime = Math.abs(todayDate - lastDate);
                    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

                    if (diffDays > 1) {
                        missedDays.value = diffDays - 1;
                    } else {
                        missedDays.value = 0;
                    }
                }
            }, { immediate: true });

            const needsRestore = computed(() => missedDays.value > 0);
            const restoreCost = computed(() => missedDays.value * 10);
            const canCheckIn = computed(() => lastCheckIn.value !== todayStr.value && !needsRestore.value);

            const streakIcon = computed(() => {
                if (streak.value === 0) return { icon: 'fa-regular fa-calendar-xmark', color: 'text-slate-500', name: 'Chưa bắt đầu' };
                if (streak.value < 3) return { icon: 'fa-solid fa-seedling', color: 'text-green-400', name: 'Mầm non' };
                if (streak.value < 7) return { icon: 'fa-solid fa-fire', color: 'text-orange-500', name: 'Đang cháy' };
                if (streak.value < 14) return { icon: 'fa-solid fa-star', color: 'text-yellow-400', name: 'Ngôi sao' };
                if (streak.value < 30) return { icon: 'fa-solid fa-gem', color: 'text-blue-400', name: 'Kim cương' };
                return { icon: 'fa-solid fa-crown', color: 'text-yellow-500', name: 'Huyền thoại' };
            });

            const nextCoinReward = computed(() => {
                const current = streak.value;
                if (current === 0) return 1; if (current === 1) return 2; if (current === 2) return 3;
                if (current === 3 || current === 4) return 5; return 6;
            });

            function checkIn() {
                if (!canCheckIn.value) return;
                coins.value += nextCoinReward.value;
                streak.value++; addExp(50);
                lastCheckIn.value = todayStr.value;
            }

            function restoreStreak() {
                if (coins.value >= restoreCost.value) {
                    coins.value -= restoreCost.value; missedDays.value = 0;
                    const yesterday = new Date(currentDate.value); yesterday.setDate(yesterday.getDate() - 1);
                    lastCheckIn.value = getStrDate(yesterday);
                }
            }

            function checkInAfterBreak() {
                streak.value = 1; coins.value += 1; addExp(50);
                lastCheckIn.value = todayStr.value; missedDays.value = 0;
            }

            function simulateNextDay() { const next = new Date(currentDate.value); next.setDate(next.getDate() + 1); currentDate.value = next; }
            function simulateMissDay() { const next = new Date(currentDate.value); next.setDate(next.getDate() + 2); currentDate.value = next; }

            // SAVE LOCALSTORAGE TỰ ĐỘNG
            watch([exp, completed, coins, streak, lastCheckIn], () => {
                localStorage.setItem('vueNuxtHubState', JSON.stringify({
                    exp: exp.value, completed: completed.value, coins: coins.value, streak: streak.value, lastCheckIn: lastCheckIn.value
                }));
            }, { deep: true });

            const completedTasks = computed(() => completed.value.length);
            const level = computed(() => {
                if (exp.value < 300) return 'Tân binh'; if (exp.value < 700) return 'Lập trình viên';
                if (exp.value < 1200) return 'Chuyên gia Nuxt'; return 'Huyền thoại Web';
            });

            function addExp(amount) { exp.value += amount; }
            function markCompleted(section, expReward) {
                if (!completed.value.includes(section)) { completed.value.push(section); addExp(expReward); }
            }

            const aiModalOpen = ref(false), aiLoading = ref(false), aiResponse = ref(''), aiTitle = ref('✨ Trợ lý AI');
            async function explainCode(codeText) {
                aiModalOpen.value = true; aiLoading.value = true; aiResponse.value = ''; aiTitle.value = '✨ AI đang phân tích code...';
                try {
                    const prompt = `Giải thích đoạn code/vấn đề sau cho người mới học Web. Dùng HTML cơ bản (<p>, <b>, <ul>, <li>, <code>). Không dùng markdown (**, *, \`\`\`):\n\n${codeText}`;
                    const sysInst = "Bạn là giảng viên Web (Vue/Nuxt/Tailwind/JS/TS). Giải thích ngắn gọn, đi thẳng vào vấn đề cốt lõi.";
                    aiResponse.value = await fetchGeminiText(prompt, sysInst);
                    aiTitle.value = '✨ Phân tích từ Trợ lý Gemini';
                } catch (error) { aiResponse.value = `<span class="text-red-400">Lỗi: ${error.message}</span>`; aiTitle.value = '❌ Lỗi'; }
                finally { aiLoading.value = false; }
            }

            return {
                exp, completed, completedTasks, level, coins, addExp, markCompleted,
                aiModalOpen, aiLoading, aiResponse, aiTitle, explainCode,
                streak, canCheckIn, streakIcon, nextCoinReward, needsRestore, missedDays, restoreCost,
                checkIn, restoreStreak, checkInAfterBreak, simulateNextDay, simulateMissDay
            };
        });

        // Components
        const VueBasic = {
            template: '#vue-basic-template',
            setup() {
                const store = useAppStore(); const newItem = ref(''); const items = ref(['Vue 3', 'Vite']);
                const addItem = () => { if (newItem.value.trim()) { items.value.push(newItem.value.trim()); newItem.value = ''; } }
                const removeItem = (i) => items.value.splice(i, 1);
                return { store, newItem, items, addItem, removeItem };
            }
        };

        const VueComponents = {
            template: '#vue-components-template',
            setup() {
                const store = useAppStore(); const parentCardTitle = ref("Thẻ số 1 (Props từ Cha)"); const likesCount = ref(0);
                const emitLike = () => { likesCount.value++; };
                return { store, parentCardTitle, likesCount, emitLike };
            }
        };

        const VueAdv = {
            template: '#vue-adv-template',
            setup() {
                const store = useAppStore(); const volume = ref(50); const warning = ref('');
                watch(volume, (val) => { if (val > 100) { volume.value = 100; warning.value = 'Âm lượng đạt mức tối đa!'; setTimeout(() => warning.value = '', 2000); } else if (val < 0) volume.value = 0; });
                const seconds = ref(0); let timer;
                onMounted(() => { timer = setInterval(() => seconds.value++, 1000); });
                onUnmounted(() => clearInterval(timer));
                return { store, volume, warning, seconds };
            }
        };

        const VueRouterTab = {
            template: '#vue-router-template',
            setup() {
                const store = useAppStore();

                // Trạng thái giả lập
                const isLoggedIn = ref(false);
                const role = ref('user');
                const currentPath = ref('/');
                const routerError = ref('');

                // Kết quả render
                const routeParams = ref({});
                const matchedComponent = ref('Home');

                // Hàm điều hướng chính (Giả lập Router)
                const navigate = (path) => {
                    routerError.value = '';
                    routeParams.value = {};

                    // --- 1. Giả lập Middleware (Guards) ---
                    if (path.startsWith('/admin')) {
                        if (!isLoggedIn.value) {
                            routerError.value = "Lỗi 401: Yêu cầu Đăng nhập!";
                            return; // Chặn, không đổi URL
                        }
                        if (role.value !== 'admin') {
                            routerError.value = "Lỗi 403: Cần quyền Admin!";
                            return; // Chặn
                        }
                        matchedComponent.value = 'AdminPanel';
                        currentPath.value = path;
                        return;
                    }

                    // --- 2. Giả lập Khớp Route (Route Matching) ---
                    currentPath.value = path;

                    if (path === '/') {
                        matchedComponent.value = 'Home';
                    }
                    else if (path.startsWith('/users/')) {
                        matchedComponent.value = 'UserProfile';
                        routeParams.value = { id: path.split('/')[2] }; // Cắt chuỗi lấy ID
                    }
                    else if (path.startsWith('/post/')) {
                        matchedComponent.value = 'PostDetail';
                        routeParams.value = { slug: path.split('/')[2] }; // Cắt chuỗi lấy Slug
                    }
                    // --- 3. Giả lập Catch-all (404 Not Found) ---
                    else {
                        matchedComponent.value = 'NotFound';
                    }
                };

                // Theo dõi khi đổi tài khoản (Giả lập việc reset trang nếu mất quyền)
                watch([isLoggedIn, role], () => {
                    if (currentPath.value === '/admin') {
                        if (!isLoggedIn.value || role.value !== 'admin') {
                            navigate('/'); // Đá về trang chủ nếu mất quyền
                        }
                    }
                });

                return { store, isLoggedIn, role, currentPath, routerError, routeParams, matchedComponent, navigate };
            }
        };

        const PiniaTab = { template: '#pinia-template', setup() { return { store: useAppStore() }; } };

        const NuxtRouting = {
            template: '#nuxt-routing-template',
            setup() {
                const route = ref('/');
                const getRouteTitle = (r) => { if (r === '/') return 'Trang Chủ'; if (r === '/about') return 'Về chúng tôi'; return 'Người dùng #123'; }
                return { store: useAppStore(), route, getRouteTitle };
            }
        };

        const NuxtData = {
            template: '#nuxt-data-template',
            setup() {
                const pending = ref(false); const data = ref(null); const error = ref(null);
                const fetchData = (shouldFail) => {
                    pending.value = true; data.value = null; error.value = null;
                    setTimeout(() => { pending.value = false; if (shouldFail) { error.value = { message: '500 Internal Server Error' }; } else { data.value = [{ id: 1, name: 'Tài liệu Vue', role: 'Official' }, { id: 2, name: 'Tài liệu Nuxt', role: 'Official' }]; } }, 1000);
                }
                return { store: useAppStore(), pending, data, error, fetchData };
            }
        }

        const NuxtSeo = {
            template: '#nuxt-seo-template',
            setup() {
                const pageTitle = ref('Học viện Vue/Nuxt Pro'); const originalTitle = document.title;
                watch(pageTitle, (val) => { document.title = val || 'Đang tải...'; }, { immediate: true });
                onUnmounted(() => document.title = originalTitle);
                return { store: useAppStore(), pageTitle };
            }
        }

        const TailwindTab = {
            template: '#tailwind-template',
            setup() {
                const store = useAppStore();
                const flexJustify = ref('justify-between'); const flexAlign = ref('items-center');
                const gridCols = ref('grid-cols-3'); const gridGap = ref('gap-4');
                return { store, flexJustify, flexAlign, gridCols, gridGap };
            }
        }

        const JsTsTab = {
            template: '#js-ts-template',
            setup() {
                const store = useAppStore();

                // 10.1 Spread demo
                const spreadResult = ref(null);
                const doSpread = () => { spreadResult.value = "{ name: 'Vue', version: 4 }"; }

                // 10.2 Array Method Demo
                const users = [{ id: 1, name: 'Vue', age: 10 }, { id: 2, name: 'Nuxt', age: 4 }, { id: 3, name: 'Pinia', age: 2 }];
                const arrayOutput = ref('Bấm nút để xem kết quả');

                const testMap = () => { arrayOutput.value = JSON.stringify(users.map(u => u.name)); }
                const testFilter = () => { arrayOutput.value = JSON.stringify(users.filter(u => u.age > 5)); }
                const testReduce = () => { arrayOutput.value = `Tổng tuổi: ${users.reduce((sum, u) => sum + u.age, 0)}`; }
                const testFind = () => { arrayOutput.value = JSON.stringify(users.find(u => u.name === 'Nuxt')); }

                // 10.3 Async Simulator
                const asyncLogs = ref([]);
                const isAsyncRunning = ref(false);

                const pushLog = (text, color = 'text-slate-300') => {
                    asyncLogs.value.push({ text, color });
                };

                const sleep = (ms) => new Promise(r => setTimeout(r, ms));

                const runAsyncDemo = async () => {
                    isAsyncRunning.value = true;
                    asyncLogs.value = [];

                    pushLog('Khởi tạo Async/Await...', 'text-blue-400');
                    await sleep(800);

                    pushLog('Đang chờ lấy danh sách bài viết (await api1)...', 'text-yellow-400');
                    await sleep(1500);
                    pushLog('[OK] Lấy bài viết thành công!', 'text-green-400');

                    pushLog('Đang chờ lấy bình luận của bài viết (await api2)...', 'text-yellow-400');
                    await sleep(1200);
                    pushLog('[OK] Lấy bình luận thành công!', 'text-green-400');

                    pushLog('App không bị đóng băng trong lúc chờ mạng! Code viết rất gọn gàng phẳng phiu.', 'text-ts font-bold');

                    isAsyncRunning.value = false;
                }

                return { store, spreadResult, doSpread, arrayOutput, testMap, testFilter, testReduce, testFind, asyncLogs, isAsyncRunning, runAsyncDemo };
            }
        }

        const AiQuiz = {
            template: '#ai-quiz-template',
            setup() {
                const store = useAppStore(); const isGenerating = ref(false); const quizData = ref(null);
                const hasAnswered = ref(false); const isCorrect = ref(false); const selectedIndex = ref(null);
                async function generateQuiz(topic) {
                    isGenerating.value = true; quizData.value = null; hasAnswered.value = false; selectedIndex.value = null;
                    try { quizData.value = await fetchGeminiJson(`Tạo 1 câu hỏi trắc nghiệm độ khó trung bình về: ${topic}.`, "Bạn là hệ thống thi lập trình Web."); }
                    catch (error) { alert("Lỗi kết nối Gemini AI."); } finally { isGenerating.value = false; }
                }
                function selectAnswer(index) {
                    if (hasAnswered.value) return;
                    selectedIndex.value = index; hasAnswered.value = true; isCorrect.value = (index === quizData.value.correctIndex);
                    if (isCorrect.value) store.addExp(200);
                }
                function resetQuiz() { quizData.value = null; hasAnswered.value = false; selectedIndex.value = null; }
                return { store, isGenerating, quizData, hasAnswered, isCorrect, selectedIndex, generateQuiz, selectAnswer, resetQuiz };
            }
        }

        const app = createApp({
            template: '#app-template',
            setup() {
                const store = useAppStore();
                const activeTab = ref('vue-basic');

                const tabs = [
                    { id: 'vue-basic', name: '1. Vue: API Styles & Directives', icon: 'fa-brands fa-vuejs', color: 'text-vue' },
                    { id: 'vue-components', name: '2. Vue: Props, Emits & Slots', icon: 'fa-solid fa-cubes', color: 'text-vue' },
                    { id: 'vue-adv', name: '3. Vue: Lifecycle & Watch', icon: 'fa-solid fa-arrows-spin', color: 'text-vue' },
                    { id: 'vue-router', name: '4. Router: Guards', icon: 'fa-solid fa-route', color: 'text-blue-400' },
                    { id: 'pinia', name: '5. Pinia: Options & Setup', icon: 'fa-solid fa-store', color: 'text-pinia' },
                    { id: 'nuxt-routing', name: '6. Nuxt: Layouts & Route', icon: 'fa-solid fa-folder-tree', color: 'text-nuxt' },
                    { id: 'nuxt-data', name: '7. Nuxt: SSR Data Fetch', icon: 'fa-solid fa-server', color: 'text-nuxt' },
                    { id: 'nuxt-seo', name: '8. Nuxt: SEO & Head', icon: 'fa-solid fa-magnifying-glass', color: 'text-nuxt' },
                    { id: 'tailwind', name: '9. Tailwind: Style Toàn tập', icon: 'fa-brands fa-css3-alt', color: 'text-cyan-400' },
                    { id: 'js-ts', name: '10. JS/TS Essentials', icon: 'fa-brands fa-js', color: 'text-ts' },
                    { id: 'ai-quiz', name: '11. ✨ AI Quiz', icon: 'fa-solid fa-wand-magic-sparkles', color: 'text-gemini' }
                ];

                const activeComponent = computed(() => {
                    const map = {
                        'vue-basic': 'VueBasic', 'vue-components': 'VueComponents', 'vue-adv': 'VueAdv',
                        'vue-router': 'VueRouterTab', 'pinia': 'PiniaTab', 'nuxt-routing': 'NuxtRouting',
                        'nuxt-data': 'NuxtData', 'nuxt-seo': 'NuxtSeo', 'tailwind': 'TailwindTab',
                        'js-ts': 'JsTsTab', 'ai-quiz': 'AiQuiz'
                    };
                    return map[activeTab.value] || 'VueBasic';
                });

                return { store, activeTab, tabs, activeComponent };
            }
        });

        const pinia = createPinia(); app.use(pinia);
        app.component('VueBasic', VueBasic);
        app.component('VueComponents', VueComponents);
        app.component('VueAdv', VueAdv);
        app.component('VueRouterTab', VueRouterTab);
        app.component('PiniaTab', PiniaTab);
        app.component('NuxtRouting', NuxtRouting);
        app.component('NuxtData', NuxtData);
        app.component('NuxtSeo', NuxtSeo);
        app.component('TailwindTab', TailwindTab);
        app.component('JsTsTab', JsTsTab);
        app.component('AiQuiz', AiQuiz);
        app.mount('#app');
    </script>
</body>
